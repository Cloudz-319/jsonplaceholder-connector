skill: jsonplaceholder-connector
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical

runners:
  jsonplaceholder-read:
    type: agent-task
    agent: operator
    task: jsonplaceholder-read
    outputs:
      response: object
    artifacts:
      wrap_as: jsonplaceholder_read
      packet: runx.jsonplaceholder.v1
    runx:
      category: data
    inputs:
      resource:
        type: string
        required: true
        description: "Resource type (posts, comments, albums, photos, todos, users)."
      id:
        type: integer
        required: false
        description: "Resource ID for single-item fetch."
      query_params:
        type: object
        required: false
        description: "Query string parameters."

  jsonplaceholder-mutate:
    type: agent-task
    agent: operator
    task: jsonplaceholder-mutate
    outputs:
      response: object
    artifacts:
      wrap_as: jsonplaceholder_mutation
      packet: runx.jsonplaceholder.v1
    runx:
      category: data
    inputs:
      resource:
        type: string
        required: true
        description: "Resource type."
      operation:
        type: string
        required: true
        enum: [POST, PUT, PATCH, DELETE]
        description: "HTTP method."
      payload:
        type: object
        required: false
        description: "Request body."
